name: Bili Auto Scraper

on:
  schedule:
    - cron: '0 * * * *'  # 每小时自动运行一次
  workflow_dispatch:      # 允许手动点击 Run workflow 按钮

permissions:
  contents: write         # 显式声明：这台临时电脑有权写入你的仓库

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/checkout@v4  # 再次确认代码拉取
      with:
        persist-credentials: true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas

    - name: Run Scraper
      run: python scraper.py  # 这里运行你的脚本，生成 index.html

    - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A  # 把所有生成的新文件（index.html, data.csv）都抓起来
        # 强制提交，即使没有变化也不会报错
        git commit -m "Update Bili Data $(date -d '8 hours' +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git push origin main
